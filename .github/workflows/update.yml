name: Daily Stock Predictions Update

on:
  schedule:
    # Runs at 23:00 UTC every weekday (after US market close at ~21:00 UTC)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-predictions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction script
        run: python update_predictions.py

      - name: Commit updated predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json
          git diff --staged --quiet || git commit -m "chore: update stock predictions $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  deploy-pages:
    needs: update-predictions
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # use freshly committed JSON

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # deploy entire repo root (index.html + data/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
